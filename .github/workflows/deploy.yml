name: Deploy to Cloudflare Pages

# Production deploy: build the static site and publish it to Cloudflare Pages
# on every push to main. Requires two repository secrets:
#   CLOUDFLARE_API_TOKEN  – token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID – the target account id
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping production deploys; let the latest push win.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy dist --project-name pum-snacks --branch main
